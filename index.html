<!DOCTYPE html>
<html>
<head>
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <style>
      body { margin: 0; }
      model-viewer { width: 100vw; height: 100vh; }
      .ar-button { 
          background: #6F4E37; 
          color: white; 
          padding: 15px; 
          border-radius: 10px; 
          border:none; 
          position: absolute; 
          bottom: 20px; 
          left: 50%; 
          transform: translateX(-50%); 
          font-family: sans-serif;
          cursor: pointer;
      }
    </style>
</head>
<body>
    <model-viewer 
        src="69a79b54dea6e53d0c2c2c8e45.glb" 
        ar 
        ar-modes="webxr scene-viewer quick-look" 
        camera-controls 
        shadow-intensity="1" 
        autoplay>
        <button slot="ar-button" class="ar-button">VER EN EL CAFÉ</button>
    </model-viewer>
</body>
</html>
